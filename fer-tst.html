<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FER – TST • Road Connection</title>
  <meta name="description" content="FER to Trans-Siberian Truckway road connection for ETS2: download, load order, and details.">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/global.css">
  <script src="assets/theme-init.js"></script>
</head>

<body>
  <header class="header" id="site-header" aria-label="Top Navigation"></header>

  <main>
    <section class="section">
      <div class="container">
        <h1 id="page-title"></h1>
        <p class="lead" id="page-tagline"></p>
      </div>
    </section>

    <section id="download" class="section">
      <div class="container grid">
        <div class="card">
          <h2 data-i18n="common.latestRelease">Latest Release</h2>
          <div id="rc-latest" class="version-item"></div>
        </div>
        <div class="card">
          <h2 data-i18n="common.downloads">Downloads</h2>
          <div id="rc-stats" class="stats-grid"></div>
        </div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container card">
        <h2 data-i18n="common.aboutThisRc">About This Road Connection</h2>
        <p class="description-text" id="page-description"></p>
        <h3 data-i18n="common.requirements">Requirements</h3>
        <div class="requirements" id="page-requirements"></div>
      </div>
    </section>

    <section id="releases" class="section">
      <div class="container card">
        <div class="tabs-header">
          <button class="tab-button active" data-tab="comments" data-i18n="common.discussion">Discussion</button>
          <button class="tab-button" data-tab="loadorder" data-i18n="common.loadOrder">Load Order</button>
          <button class="tab-button" data-tab="versions" data-i18n="common.allReleases">All Releases</button>
        </div>

        <div class="tab-content active" id="tab-comments">
          <div id="comments-section" data-page-id="fer-tst"></div>
        </div>

        <div class="tab-content" id="tab-loadorder">
          <p style="color:var(--muted); font-size:14px; margin:0 0 16px;" data-i18n="common.loadOrderHintShort">Place mods in this priority (top = highest):</p>
          <div id="load-order"></div>
        </div>

        <div class="tab-content" id="tab-versions">
          <div id="rc-versions" class="versions-list" aria-label="RC releases list"></div>
        </div>
      </div>
    </section>

    <section id="notes" class="section">
      <div class="container card">
        <h2 data-i18n="common.notes">Notes</h2>
        <ul>
          <li data-i18n="rcNotes.placeAbove">Place the RC above both main maps in the Mod Manager</li>
          <li data-i18n="rcNotes.onlyInstall.tst">Only install if you use both FER and TST</li>
          <li data-i18n="rcNotes.syncedReleases">Updated in sync with major FER releases</li>
          <li><span data-i18n="rcNotes.report">Report issues via</span> <a href="https://discord.gg/SSWDJMauxz" target="_blank"
              style="color:var(--text-bright)">Discord</a></li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <script src="assets/site-data.js"></script>
  <script src="assets/versions.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/site-renderer.js"></script>
  <script src="assets/comments.js"></script>
  <script>
    (function () {
      var S = window.SITE;
      var P = S && S.pages && S.pages.ferTst;
      if (!P) return;

      function loc(field) {
        return (window.I18N && window.I18N.localize) ? window.I18N.localize(P, field) : P[field];
      }

      function render() {
        var t = document.getElementById('page-title');
        var tl = document.getElementById('page-tagline');
        if (t) t.textContent = loc('title');
        if (tl) tl.textContent = loc('tagline');

        var desc = document.getElementById('page-description');
        if (desc) desc.textContent = loc('description');

        var reqEl = document.getElementById('page-requirements');
        if (reqEl) {
          reqEl.innerHTML = "";
          var reqs = loc('requirements') || [];
          reqs.forEach(function (r) {
            var span = document.createElement('span');
            span.className = 'req-tag';
            span.textContent = r;
            reqEl.appendChild(span);
          });
        }
      }
      render();
      if (window.I18N && window.I18N.onChange) window.I18N.onChange(render);

      var data = (window.RELEASES && window.RELEASES.rcs && window.RELEASES.rcs.tst) || [];
      var latest = document.getElementById('rc-latest');
      if (data.length && latest && window.makeVersionItem) {
        latest.replaceWith(window.makeVersionItem(data[0], 'FER – TST'));
      }
      var list = document.getElementById('rc-versions');
      if (list && window.makeVersionItem) {
        data.forEach(function (v) { list.appendChild(window.makeVersionItem(v, 'FER – TST')); });
      }

      var statsEl = document.getElementById('rc-stats');
      if (statsEl && window.FERDownloads) {
        var lang = (window.I18N && window.I18N.getLang && window.I18N.getLang()) || 'en';
        var dlLabel = lang === 'ru' ? 'всего загрузок' : 'total downloads';
        var dlCard = document.createElement('div');
        dlCard.className = 'stat-card stat-card-wide';
        dlCard.innerHTML = '<div class="stat-value">…</div><div class="stat-label">' + dlLabel + '</div>';
        statsEl.appendChild(dlCard);
        window.FERDownloads.sumReleases(data).then(function (total) {
          dlCard.querySelector('.stat-value').textContent = total.toLocaleString();
        });
      }
    })();
  </script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8634469444021702"
       crossorigin="anonymous"></script>

  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-8634469444021702"
       data-ad-slot="3133328743"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</body>

</html>
